steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'us-central1-docker.pkg.dev/$PROJECT_ID/my-repo/map-sync:$COMMIT_SHA', '.']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'us-central1-docker.pkg.dev/$PROJECT_ID/my-repo/map-sync:$COMMIT_SHA']
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - jobs
      - deploy
      - map-sync
      - --image=us-central1-docker.pkg.dev/$PROJECT_ID/my-repo/map-sync:$COMMIT_SHA
      - --region=us-central1
images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/my-repo/map-sync:$COMMIT_SHA'